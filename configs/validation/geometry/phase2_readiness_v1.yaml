gates:
  - gate_id: metadata-audit
    status: audit-ready
    metadata_ready: true
    execution_ready: false
    pack_authorizes_data_access: false
    sealed: false
    targets: []
    registered_operations: []
    blockers: []
    notes: The checked-in registry, ledger, Phase 2 specification, and tracked legacy metadata can be audited without resolving a dataset root.

  - gate_id: consumed-tum-regression
    status: partial-runtime-implemented
    metadata_ready: true
    execution_ready: false
    pack_authorizes_data_access: false
    sealed: false
    targets:
      - dataset_id: tum-rgbd.geometry-regression
        split_id: tum-rgbd.phase2b-freiburg1-xyz-test
        registry_target_state: open
        ledger_state: consumed
      - dataset_id: tum-rgbd.geometry-regression
        split_id: tum-rgbd.phase2c-freiburg3-test
        registry_target_state: open
        ledger_state: consumed
    registered_operations: [regression, mechanism-diagnostic, reporting]
    blockers:
      - code: TUM_LEGACY_MANIFEST_NOT_WAVE_A
        category: manifest
        description: The registered TUM files are composite legacy protocol manifests rather than per-split jepa4d-split-manifest-v1 artifacts; this limits evidence promotion but does not prohibit the exact consumed Phase 2b regression.
      - code: TUM_GOVERNED_RUNTIME_COVERAGE_INCOMPLETE
        category: implementation
        description: A hash-bound, test-covered governed runtime exists only for the Phase 2b split; Phase 2c has no equivalent clean-commit Slurm/W&B/postflight path, and no terminal execution receipt is bound into this pack.
    notes: A hash-bound clean-commit runner authorizes only the registered consumed Phase 2b regression before resolving the verified archive and can support integration/regression diagnostics only. Phase 2c remains unwrapped, neither split has Wave A manifest proof, and no fresh transfer, model-selection, or promotion claim is supported.

  - gate_id: sun-development
    status: policy-blocked
    metadata_ready: true
    execution_ready: false
    pack_authorizes_data_access: false
    sealed: false
    targets:
      - dataset_id: sun-rgbd.geometry-development
        split_id: sun-rgbd.phase2e-kv2-test
        registry_target_state: open
        ledger_state: consumed
      - dataset_id: sun-rgbd.geometry-development
        split_id: sun-rgbd.phase2f-four-family-development
        registry_target_state: open
        ledger_state: consumed
    registered_operations: [development-evaluation, regression, mechanism-diagnostic, reporting]
    blockers:
      - code: SUN_CONSTITUENT_LICENSE_PENDING
        category: legal
        description: No approved blanket license covers every selected SUN RGB-D constituent source; the registry legal audit remains pending.
      - code: SUN_IDENTITY_ONLY_SELECTION_UNFROZEN
        category: governance
        description: The balanced four-family identity-only selection algorithm is not frozen under the Wave A target-isolation contract.
      - code: SUN_INVALID_DEPTH_POLICY_UNFROZEN
        category: preregistration
        description: The insufficient-valid-depth failure or replacement policy is not preregistered.
      - code: SUN_LEGACY_MANIFEST_NOT_WAVE_A
        category: manifest
        description: The Phase 2e file combines train, validation, and test rows and stores target-derived validation statistics instead of one target-free manifest per registered split.
      - code: SUN_PHASE2F_RECEIPT_NOT_IN_CLEAN_CLONE
        category: manifest
        description: The Phase 2f registered id_manifest path is an ignored local output receipt, not a repository-tracked portable membership artifact.
      - code: SUN_GOVERNED_TARGET_SEPARATION_MISSING
        category: implementation
        description: Existing enumeration and loading APIs expose depth paths and are not gated by the registry-and-ledger access controller.
      - code: PHASE2_PREREGISTRATION_MISSING
        category: preregistration
        description: The Phase 2 geometry specification remains proposed and has not been frozen as a hash-bound formal preregistration.
    notes: All named SUN families are consumed development evidence; this pack does not authorize further decoding, cache construction, training, or evaluation.

  - gate_id: diode-external
    status: sealed-blocked
    metadata_ready: true
    execution_ready: false
    pack_authorizes_data_access: false
    sealed: true
    targets:
      - dataset_id: diode.geometry-external
        split_id: diode.validation-external
        registry_target_state: sealed
        ledger_state: sealed-unopened
    registered_operations: [metadata-audit, external-evaluation, reporting]
    blockers:
      - code: DIODE_SIGNER_PENDING
        category: governance
        description: No trusted Ed25519 key ID and public key have been approved in the registry.
      - code: APPEND_ONLY_EVENT_STORE_MISSING
        category: governance
        description: The bound ledger uses rollbackable local-filesystem-best-effort state rather than an approved externally append-only store.
      - code: SUN_SURVIVOR_NOT_FROZEN
        category: preregistration
        description: No single SUN-selected architecture, paired M0, checkpoint, clean commit, configuration, and distinct calibrator have been frozen.
      - code: DIODE_EXTERNAL_PREREGISTRATION_MISSING
        category: preregistration
        description: The one-shot external metric, domain aggregation, grouping, failure, qualitative-ID, and effect-margin protocol is not preregistered.
      - code: DIODE_ENUMERATION_NOT_FROZEN
        category: manifest
        description: No target-free portable artifact freezes the exact official validation enumeration, expected units, or independent grouping policy.
      - code: DIODE_GOVERNED_ADAPTER_ABSENT
        category: implementation
        description: No DIODE adapter may be constructed before the atomic signed first-open transition is approved and executed.
    notes: DIODE remains sealed and unconsumed; this pack permits validation of prior metadata only and never receives or resolves the archive path.

