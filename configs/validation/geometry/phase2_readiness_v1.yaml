claim_boundary:
  supported:
    - Repository metadata for the current Phase 2 registry, ledger, specification, and tracked legacy manifests is internally bound and auditable.
    - TUM and SUN results remain consumed historical or development evidence; TUM overlap is recomputable from tracked manifests, while the Phase 2f SUN overlap is a historical assertion committed by its recorded selection hash but unavailable for clean-clone recomputation.
    - DIODE remains sealed according to the bound registry and ledger metadata.
  prohibited:
    - This pack does not authorize dataset access, decoding, cache access, training, regression execution, or evaluation.
    - This pack does not establish SUN legal approval, a frozen Phase 2 preregistration, or scientific execution readiness.
    - This pack does not authorize DIODE listing, extraction, sampling, decoding, hashing, statistics, visualization, caching, or external evaluation.
    - No SUN or TUM result in this lineage is fresh external confirmation.
